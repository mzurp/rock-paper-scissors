<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>

<script>
    console.log("Hello, World!")
</script>

<script>
    function getComputerChoice() {
    let randomNumber = Math.floor(Math.random() * 3);

        if (randomNumber === 0) {
            return "piedra";
        } else if (randomNumber === 1) {
            return "papel";
        } else {
            return "tijeras";
        }
    }
    console.log(getComputerChoice());
</script>

<script>
    function getHumanChoice(){
        return prompt("¿Qué prefieres? piedra, papel o tijeras");
    }
    console.log(getHumanChoice());
</script>

<script>
    let humanScore = 0;
    let computerScore = 0;
</script>

<script>
    function playRound(humanChoice, computerChoice) {
        humanChoice = humanChoice.toLowerCase();

    if (humanChoice === computerChoice) {
        console.log("¡Empate!");
    } else if (
        (humanChoice === "piedra" && computerChoice === "tijeras") ||
        (humanChoice === "papel" && computerChoice === "piedra") ||
        (humanChoice === "tijeras" && computerChoice === "papel")
    ) {
        humanScore++;
        console.log(`¡Ganaste! ${humanChoice} vence a ${computerChoice}`);
    } else {
        computerScore++;
        console.log(`¡Perdiste! ${computerChoice} vence a ${humanChoice}`);
    }
        console.log(`Jugador: ${humanScore} | Computadora: ${computerScore}`);
    }   

    const humanSelection = getHumanChoice();
const computerSelection = getComputerChoice();

playRound(humanSelection, computerSelection);

    
</script>

</body>
</html>
